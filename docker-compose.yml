version: "3.8"

# ═══════════════════════════════════════════════════════════════
# RAOSS Hub v3 — Full Docker Stack
# Run:  docker compose up --build
# URL:  http://localhost
# ═══════════════════════════════════════════════════════════════

services:
  postgres:
    image: postgres:15-alpine
    container_name: raoss-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: raosshub
      POSTGRES_USER: raoss
      POSTGRES_PASSWORD: raoss_dev_2024
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U raoss -d raosshub" ]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: raoss-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: raossminio
      MINIO_ROOT_PASSWORD: raossminio2024
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: [ "CMD", "mc", "ready", "local" ]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: raoss-backend
    restart: unless-stopped
    environment:
      # These override application.yml when running in Docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/raosshub
      SPRING_DATASOURCE_USERNAME: raoss
      SPRING_DATASOURCE_PASSWORD: raoss_dev_2024
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_SQL_INIT_MODE: always
      APP_JWT_SECRET: raosshub-jwt-secret-key-change-in-production-2024
      APP_JWT_EXPIRATION_MS: 900000
      APP_JWT_REFRESH_EXPIRATION_MS: 604800000
      APP_S3_ENDPOINT: http://minio:9000
      APP_S3_ACCESS_KEY: raossminio
      APP_S3_SECRET_KEY: raossminio2024
      APP_S3_BUCKET_FILES: raosshub-files
      APP_S3_BUCKET_GALLERY: raosshub-gallery
      APP_S3_BUCKET_PDFS: raosshub-pdfs
      APP_KIMI_API_KEY: ""
      APP_CORS_ALLOWED_ORIGINS: "http://localhost,http://localhost:80,http://localhost:3000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: raoss-frontend
    restart: unless-stopped
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: raoss-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  minio_data:
