server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: raosshub-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/raosshub}
    username: ${SPRING_DATASOURCE_USERNAME:raoss}
    password: ${SPRING_DATASOURCE_PASSWORD:raoss_dev_2024}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: false
    defer-datasource-initialization: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          lob:
            non_contextual_creation: true

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 200MB
      enabled: true

  sql:
    init:
      mode: ${SPRING_SQL_INIT_MODE:always}
      schema-locations: classpath:schema.sql
      continue-on-error: true

  mail:
    host: localhost
    port: 587
    username:
    password:
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  jwt:
    secret: ${APP_JWT_SECRET:raosshub-jwt-secret-key-change-in-production-2024}
    expiration-ms: ${APP_JWT_EXPIRATION_MS:900000}
    refresh-expiration-ms: ${APP_JWT_REFRESH_EXPIRATION_MS:604800000}
    # false for local HTTP dev, true for production HTTPS (set APP_JWT_COOKIE_SECURE=true)
    cookie-secure: ${APP_JWT_COOKIE_SECURE:false}

  s3:
    endpoint: ${APP_S3_ENDPOINT:http://localhost:9000}
    access-key: ${APP_S3_ACCESS_KEY:raossminio}
    secret-key: ${APP_S3_SECRET_KEY:raossminio2024}
    bucket-files: ${APP_S3_BUCKET_FILES:raosshub-files}
    bucket-gallery: ${APP_S3_BUCKET_GALLERY:raosshub-gallery}
    bucket-pdfs: ${APP_S3_BUCKET_PDFS:raosshub-pdfs}
    region: us-east-1
    path-style-access: true

  kimi:
    api-key: ${APP_KIMI_API_KEY:}
    base-url: https://api.moonshot.cn/v1
    # Max Kimi requests per user per minute. Prevents cost runaway and Moonshot API 429s.
    # Default 10 covers normal conversational use. Override via APP_KIMI_RATE_LIMIT.
    rate-limit-per-minute: ${APP_KIMI_RATE_LIMIT:10}

  cors:
    # Comma-separated. Override via APP_CORS_ALLOWED_ORIGINS in production.
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost,http://localhost:80}

logging:
  level:
    com.raosshub: INFO
    org.springframework.security: WARN
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
