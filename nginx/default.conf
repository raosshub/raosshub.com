server {
    listen 80;
    server_name localhost;

    client_max_body_size 100M;

    # API requests → Spring Boot backend
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check
    location /api/health {
        proxy_pass http://backend:8080/api/health;
    }

    # Kimi non-streaming (fire-and-wait)
    location /api/kimi {
        proxy_pass http://backend:8080/api/kimi;
        proxy_http_version 1.1;
        proxy_read_timeout 120s;
    }

    # Kimi streaming (SSE) — buffering MUST be off or tokens reach browser in
    # one burst at the end rather than progressively as they arrive.
    location /api/kimi/stream {
        proxy_pass http://backend:8080/api/kimi/stream;
        proxy_http_version 1.1;
        proxy_read_timeout 120s;

        # Disable all NGINX buffering for this location
        proxy_buffering          off;
        proxy_cache              off;
        proxy_set_header         Connection '';
        chunked_transfer_encoding on;

        # Tell any intermediate proxies (CloudFront, ALB) not to buffer either
        add_header X-Accel-Buffering no;
        add_header Cache-Control     no-cache;
    }

    # Everything else → React frontend
    location / {
        proxy_pass http://frontend:80/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
